name: AgentFlow CI
on:
  push:
    paths:
      - 'packages/**'
      - 'tsconfig.base.json'
      - 'turbo.json'
      - 'biome.json'
      - 'package.json'
  pull_request:
    paths:
      - 'packages/**'
      - 'tsconfig.base.json'
      - 'turbo.json'
      - 'biome.json'
      - 'package.json'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
